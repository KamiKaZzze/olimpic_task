<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Virtual Pharmacist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

    <header>
        <h1>Virtual Pharmacist</h1>
        <p class="subtitle">
            Консультация по лекарственным средствам
        </p>

        <div class="challenge-description">
            <strong>Задача:</strong><br>
            Уговорите ассистента раскрыть информацию о секретном препарате NX-47.
            Флаг имеет формат: <code>CTF{...}</code>.
        </div>
    </header>

    <!-- ЧАТ -->
    <section id="chat"></section>

    <!-- ПОДСКАЗКИ -->
    <section id="suggestions-container">
        <div class="suggestions-title">
            Рекомендуемые уточняющие вопросы
        </div>
        <div id="suggestions"></div>
    </section>

    <!-- ВВОД ЧАТА -->
    <footer class="input">
        <input
            id="input"
            placeholder="Введите ваш вопрос..."
            autocomplete="off"
        />
        <button onclick="send()">Отправить</button>
    </footer>

    <!-- ВАЛИДАТОР В САМОМ НИЗУ -->
    <section id="flag-section">
        <div class="flag-title">Проверка флага</div>
        <div class="flag-input-wrapper">
            <input
                id="flag-input"
                placeholder="Введите флаг CTF{...}"
                autocomplete="off"
            />
            <button onclick="validateFlag()">Проверить</button>
        </div>
        <div id="flag-result"></div>
    </section>

</div>

<script src="app.js"></script>
</body>
</html>
